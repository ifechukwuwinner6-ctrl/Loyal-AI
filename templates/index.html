<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOYAL AI</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000;
            color: #ececf1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background-color: #000000;
            border-bottom: 1px solid #1a1a1a;
            z-index: 10;
        }
        .menu-icon {
            font-size: 1.5rem;
            color: #b4b4b4;
            cursor: pointer;
            padding: 4px;
        }
        .badge-btn {
            background-color: #202123;
            color: #c5c5d2;
            border: 1px solid #4d4d4d;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        main {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 80px;
        }
        .chat-bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .chat-bubble.user {
            background-color: #2f2f2f;
            color: #ffffff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .chat-bubble.ai {
            background-color: transparent;
            color: #ececf1;
            align-self: flex-start;
        }
        .input-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 12px 16px 20px 16px;
            background-color: #000000;
            border-top: 1px solid #1a1a1a;
            z-index: 10;
        }
        .input-capsule {
            display: flex;
            align-items: center;
            background-color: #212121;
            border-radius: 28px;
            padding: 6px 14px;
            gap: 10px;
            width: 100%;
        }
        .plus-btn { color: #b4b4b4; font-size: 1.4rem; }
        input[type="text"] {
            flex: 1;
            background: none;
            border: none;
            color: white;
            padding: 10px 4px;
            font-size: 1rem;
            outline: none;
        }
        input[type="text"]::placeholder { color: #7d7d7d; }
        .send-btn {
            background-color: #ffffff;
            color: #000000;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background-color: #171717;
            z-index: 100;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
            padding: 16px;
            box-shadow: 4px 0 10px rgba(0,0,0,0.5);
        }
        .sidebar.open { left: 0; }
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 90;
            display: none;
        }
        .sidebar-overlay.active { display: block; }
        .search-box {
            width: 100%;
            padding: 10px 14px;
            background-color: #212121;
            border: 1px solid #333;
            border-radius: 20px;
            color: white;
            font-size: 0.9rem;
            outline: none;
            margin-bottom: 24px;
        }
        .menu-heading {
            font-size: 0.8rem;
            color: #666;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .history-item {
            color: #ececf1;
            font-size: 0.95rem;
            text-decoration: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .new-chat-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            font-size: 1rem;
            margin-bottom: 24px;
            background: none;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebarMenu">
        <input type="text" class="search-box" placeholder="🔍 Search for chats">
        <button class="new-chat-btn" onclick="clearChat()"><span>📝</span> New chat</button>
        <div class="menu-heading">Chats</div>
        <div class="history-list">
            <a href="#" class="history-item" onclick="loadMockChat('Build Mobile Apps')">Build Mobile Apps...</a>
            <a href="#" class="history-item" onclick="loadMockChat('Price Scraper Backend')">Price Scraper Back...</a>
        </div>
    </div>

    <header>
        <div class="menu-icon" onclick="toggleSidebar()">☰</div>
        <button class="badge-btn">✦ Get Plus</button>
        <div class="menu-icon" style="font-size: 1.2rem;">👤</div>
    </header>

    <main id="chat-stream">
        <div class="chat-bubble ai">Welcome to LOYAL AI. Ask me anything!</div>
    </main>

    <div class="input-container">
        <div class="input-capsule">
            <div class="plus-btn">+</div>
            <!-- Updated placeholder to Ask LOYAL AI -->
            <input type="text" id="user-input" placeholder="Ask LOYAL AI">
            <button class="send-btn" onclick="executeChatAction()">↑</button>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebarMenu').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function clearChat() {
            document.getElementById('chat-stream').innerHTML = '<div class="chat-bubble ai">Started a fresh conversation.</div>';
            toggleSidebar();
        }

        function loadMockChat(title) {
            const streamBox = document.getElementById('chat-stream');
            streamBox.innerHTML = `
                <div class="chat-bubble user">Open logs for: ${title}</div>
                <div class="chat-bubble ai">Loaded previous workspace logs for "${title}".</div>
            `;
            toggleSidebar();
        }

        async function executeChatAction() {
            const inputField = document.getElementById('user-input');
            const userText = inputField.value.trim();
            if (!userText) return;
            
            const streamBox = document.getElementById('chat-stream');
            
            const userBubble = document.createElement('div');
            userBubble.className = 'chat-bubble user';
            userBubble.innerText = userText;
            streamBox.appendChild(userBubble);
            
            inputField.value = '';
            streamBox.scrollTop = streamBox.scrollHeight;
            
            const typingBubble = document.createElement('div');
            typingBubble.className = 'chat-bubble ai';
            typingBubble.style.color = '#7d7d7d';
            typingBubble.innerText = "LOYAL AI is thinking...";
            streamBox.appendChild(typingBubble);
            streamBox.scrollTop = streamBox.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: userText })
                });
                const data = await response.json();
                
                typingBubble.style.color = '#ececf1';
                typingBubble.innerText = data.reply;
            } catch (error) {
                typingBubble.innerText = "Error contacting LOYAL AI engine.";
            }
            streamBox.scrollTop = streamBox.scrollHeight;
        }

        document.getElementById('user-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') executeChatAction();
        });
    </script>
</body>
</html>
