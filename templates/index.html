<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Mobile App</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000; /* Pure black backdrop */
            color: #ececf1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Top Minimalist Control Bar matching image 54909.jpg */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background-color: #000000;
        }
        .menu-icon {
            font-size: 1.5rem;
            color: #b4b4b4;
            cursor: pointer;
        }
        .badge-btn {
            background-color: #202123;
            color: #c5c5d2;
            border: 1px solid #4d4d4d;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* Chat Stream Screen area */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        /* Interactive Chat Dialogue Bubbles */
        .chat-bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .chat-bubble.user {
            background-color: #2f2f2f; /* Dark capsule for user text */
            color: #ffffff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .chat-bubble.ai {
            background-color: transparent; /* Flat modern alignment for AI responses */
            color: #ececf1;
            align-self: flex-start;
        }

        /* Bottom Floating Input Capsule Layout matching image 54909.jpg */
        .input-container {
            padding: 12px 16px 24px 16px;
            background-color: #000000;
        }
        .input-capsule {
            display: flex;
            align-items: center;
            background-color: #212121;
            border-radius: 28px;
            padding: 6px 14px;
            gap: 10px;
        }
        .plus-btn {
            color: #b4b4b4;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 0 4px;
        }
        input[type="text"] {
            flex: 1;
            background: none;
            border: none;
            color: white;
            padding: 10px 4px;
            font-size: 1rem;
            outline: none;
        }
        input[type="text"]::placeholder {
            color: #7d7d7d;
        }
        
        /* Round Send Action Button */
        .send-btn {
            background-color: #ffffff;
            color: #000000;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Minimalist header interface layout -->
    <header>
        <div class="menu-icon">☰</div>
        <button class="badge-btn">✦ Get Plus</button>
        <div class="menu-icon" style="font-size: 1.2rem;">👤</div>
    </header>

    <!-- Chat history window -->
    <main id="chat-stream">
        <div class="chat-bubble ai">Hello! How can I help you today?</div>
    </main>

    <!-- Input capsule field container -->
    <div class="input-container">
        <div class="input-capsule">
            <div class="plus-btn">+</div>
            <input type="text" id="user-input" placeholder="Ask ChatGPT" user-select="text">
            <button class="send-btn" onclick="executeChatAction()">↑</button>
        </div>
    </div>

    <script>
        // Handles processing dynamic inputs and mock response stream generation
        function executeChatAction() {
            const inputField = document.getElementById('user-input');
            const userText = inputField.value.trim();
            
            if (!userText) return;
            
            const streamBox = document.getElementById('chat-stream');
            
            // 1. Render User Message Capsule
            const userBubble = document.createElement('div');
            userBubble.className = 'chat-bubble user';
            userBubble.innerText = userText;
            streamBox.appendChild(userBubble);
            
            // Clear entry field
            inputField.value = '';
            streamBox.scrollTop = streamBox.scrollHeight;
            
            // 2. Generate Responsive AI Answer
            setTimeout(() => {
                const aiBubble = document.createElement('div');
                aiBubble.className = 'chat-bubble ai';
                
                // Smart response lookup based on standard inputs
                if(userText.toLowerCase().includes('date')) {
                    const today = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                    aiBubble.innerText = "Today's date is " + today + ".";
                } else {
                    aiBubble.innerText = "I received your message: \"" + userText + "\". The mobile pipeline architecture is ready to link up your production scrapers or data APIs next!";
                }
                
                streamBox.appendChild(aiBubble);
                streamBox.scrollTop = streamBox.scrollHeight;
            }, 600);
        }

        // Enter Key submit action mapping
        document.getElementById('user-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                executeChatAction();
            }
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript,console.log("Service Worker Registered");');
        }
    </script>
</body>
</html>
