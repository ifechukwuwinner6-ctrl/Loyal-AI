<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOYAL AI</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000;
            color: #ececf1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background-color: #000000;
            border-bottom: 1px solid #1a1a1a;
            z-index: 10;
        }
        .menu-icon {
            font-size: 1.5rem;
            color: #b4b4b4;
            cursor: pointer;
            padding: 4px;
        }
        .badge-btn {
            background-color: #202123;
            color: #c5c5d2;
            border: 1px solid #4d4d4d;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        main {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 180px; 
            scroll-behavior: smooth;
        }
        .chat-bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .chat-bubble.user {
            background-color: #2f2f2f;
            color: #ffffff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .chat-bubble.ai {
            background-color: transparent;
            color: #ececf1;
            align-self: flex-start;
        }
        .chat-image {
            max-width: 100%;
            max-height: 250px;
            border-radius: 12px;
            margin-top: 8px;
            display: block;
        }
        .input-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 12px 16px 24px 16px;
            background-color: #000000;
            border-top: 1px solid #1a1a1a;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .input-capsule {
            display: flex;
            align-items: center;
            background-color: #212121;
            border-radius: 28px;
            padding: 6px 14px;
            gap: 10px;
            width: 100%;
        }
        .plus-btn { color: #b4b4b4; font-size: 1.4rem; cursor: pointer; user-select: none; }
        input[type="text"] {
            flex: 1;
            background: none;
            border: none;
            color: white;
            padding: 10px 4px;
            font-size: 1rem;
            outline: none;
        }
        input[type="text"]::placeholder { color: #7d7d7d; }
        .send-btn {
            background-color: #ffffff;
            color: #000000;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
        }
        .preview-box {
            display: none;
            align-items: center;
            gap: 8px;
            background-color: #212121;
            padding: 6px 12px;
            border-radius: 12px;
            align-self: flex-start;
        }
        .preview-img { width: 35px; height: 35px; border-radius: 6px; object-fit: cover; }
        .preview-text { font-size: 0.85rem; color: #b4b4b4; max-width: 180px; overflow: hidden; text-overflow: ellipsis; }
        .remove-preview { color: #ff4a4a; font-weight: bold; cursor: pointer; }
        
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background-color: #171717;
            z-index: 100;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
            padding: 16px;
        }
        .sidebar.open { left: 0; }
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 90;
            display: none;
        }
        .sidebar-overlay.active { display: block; }
        .search-box {
            width: 100%;
            padding: 10px 14px;
            background-color: #212121;
            border: 1px solid #333;
            border-radius: 20px;
            color: white;
            font-size: 0.9rem;
            outline: none;
            margin-bottom: 24px;
        }
        .menu-heading { font-size: 0.8rem; color: #666; text-transform: uppercase; font-weight: bold; margin-bottom: 12px; }
        .history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
        .history-item { color: #ececf1; font-size: 0.95rem; text-decoration: none; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .new-chat-btn { display: flex; align-items: center; gap: 10px; color: white; font-size: 1rem; margin-bottom: 24px; background: none; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebarMenu">
        <input type="text" class="search-box" placeholder="🔍 Search for chats">
        <button class="new-chat-btn" onclick="clearChat()"><span>📝</span> New chat</button>
        <div class="menu-heading">Recent Conversations</div>
        <div class="history-list" id="sidebar-history-container"></div>
    </div>

    <header>
        <div class="menu-icon" onclick="toggleSidebar()">☰</div>
        <button class="badge-btn">✦ Get Plus</button>
        <div class="menu-icon" style="font-size: 1.2rem;">👤</div>
    </header>

    <main id="chat-stream"></main>

    <div class="input-container">
        <div class="preview-box" id="p-box">
            <img src="" id="p-img" class="preview-img">
            <span id="p-text" class="preview-text"></span>
            <span class="remove-preview" onclick="clearSelectedFile()">×</span>
        </div>

        <div class="input-capsule">
            <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="handleFileSelect()">
            <div class="plus-btn" onclick="document.getElementById('file-input').click()">+</div>
            <input type="text" id="user-input" placeholder="Ask LOYAL AI">
            <button class="send-btn" onclick="executeChatAction()">↑</button>
        </div>
    </div>

    <script>
        let selectedFileBase64 = null;
        let selectedFileMime = null;
        let previewSrcUrl = null;

        window.onload = function() {
            loadSavedChatHistoryLog();
            loadActiveConversationBubbles();
        };

        function toggleSidebar() {
            document.getElementById('sidebarMenu').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function handleFileSelect() {
            const fileInput = document.getElementById('file-input');
            const file = fileInput.files[0];
            if (file) {
                selectedFileMime = file.type;
                document.getElementById('p-text').innerText = file.name;
                const reader = new FileReader();
                reader.onload = function(e) {
                    selectedFileBase64 = e.target.result.split(',')[1];
                    previewSrcUrl = e.target.result;
                    document.getElementById('p-img').src = previewSrcUrl;
                    document.getElementById('p-box').style.display = 'flex';
                };
                reader.readAsDataURL(file);
            }
        }

        function clearSelectedFile() {
            selectedFileBase64 = null;
            selectedFileMime = null;
            previewSrcUrl = null;
            document.getElementById('file-input').value = '';
            document.getElementById('p-box').style.display = 'none';
        }

        function scrollToBottom() {
            const streamBox = document.getElementById('chat-stream');
            setTimeout(() => { streamBox.scrollTop = streamBox.scrollHeight; }, 50);
        }

        function saveCurrentChatBubblesState() {
            const streamBox = document.getElementById('chat-stream');
            localStorage.setItem('loyal_ai_bubbles_html', streamBox.innerHTML);
        }

        function loadActiveConversationBubbles() {
            const savedHtml = localStorage.getItem('loyal_ai_bubbles_html');
            const streamBox = document.getElementById('chat-stream');
            if (savedHtml && savedHtml.trim() !== "") {
                streamBox.innerHTML = savedHtml;
            } else {
                streamBox.innerHTML = '<div class="chat-bubble ai">Welcome to LOYAL AI. How can I help you today?</div>';
            }
            scrollToBottom();
        }

        function saveChatTitleToSidebarList(titleText) {
            let historyList = JSON.parse(localStorage.getItem('loyal_ai_sidebar_titles')) || [];
            if (!historyList.includes(titleText)) {
                historyList.unshift(titleText);
                if (historyList.length > 8) historyList.pop();
                localStorage.setItem('loyal_ai_sidebar_titles', JSON.stringify(historyList));
                loadSavedChatHistoryLog();
            }
        }

        function loadSavedChatHistoryLog() {
            const historyContainer = document.getElementById('sidebar-history-container');
            const historyList = JSON.parse(localStorage.getItem('loyal_ai_sidebar_titles')) || [];
            historyContainer.innerHTML = '';
            if (historyList.length === 0) {
                historyContainer.innerHTML = '<div class="history-item" style="color:#555;cursor:default;">No recent chats</div>';
                return;
            }
            historyList.forEach(title => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerText = title;
                item.onclick = function() { toggleSidebar(); };
                historyContainer.appendChild(item);
            });
        }

        function clearChat() {
            localStorage.removeItem('loyal_ai_bubbles_html');
            document.getElementById('chat-stream').innerHTML = '<div class="chat-bubble ai">Started a fresh conversation logs workspace.</div>';
            saveCurrentChatBubblesState();
            toggleSidebar();
        }

        async function executeChatAction() {
            const inputField = document.getElementById('user-input');
            const userText = inputField.value.trim();
            const streamBox = document.getElementById('chat-stream');
            
            if (!userText && !selectedFileBase64) return;
            
            if (userText) {
                const displayTitle = userText.substring(0, 24) + (userText.length > 24 ? '...' : '');
                saveChatTitleToSidebarList(displayTitle);
            }

            const userBubble = document.createElement('div');
            userBubble.className = 'chat-bubble user';
            
            if (previewSrcUrl) {
                const imgElement = document.createElement('img');
                imgElement.src = previewSrcUrl;
                imgElement.className = 'chat-image';
                userBubble.appendChild(imgElement);
            }
            if (userText) {
                const textSpan = document.createElement('div');
                textSpan.innerText = userText;
                userBubble.appendChild(textSpan);
            }
            streamBox.appendChild(userBubble);
            saveCurrentChatBubblesState();
            
            const activeMsg = userText || "Process attached file elements";
            const activeImg = selectedFileBase64;
            const activeMime = selectedFileMime;
            
            inputField.value = '';
            clearSelectedFile();
            scrollToBottom();
            
            const typingBubble = document.createElement('div');
            typingBubble.className = 'chat-bubble ai';
            typingBubble.style.color = '#7d7d7d';
            typingBubble.innerText = "LOYAL AI is typing...";
            streamBox.appendChild(typingBubble);
            scrollToBottom();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: activeMsg, image_data: activeImg, image_mime: activeMime })
                });
                const data = await response.json();
                
                typingBubble.style.color = '#ececf1';
                
                // CRITICAL VISUAL FIX: If server sends back an image, create text and an image element inside the chat bubble
                if (data.type === 'image') {
                    typingBubble.innerHTML = `<div>${data.reply}</div><img src="data:image/jpeg;base64,${data.image_data}" class="chat-image">`;
                } else {
                    typingBubble.innerText = data.reply;
                }
            } catch (error) {
                typingBubble.innerText = "Error establishing secure connection link.";
            }
            
            saveCurrentChatBubblesState();
            scrollToBottom();
        }

        document.getElementById('user-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') executeChatAction();
        });
    </script>
</body>
</html>
