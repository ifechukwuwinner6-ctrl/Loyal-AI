<div class="input-container">
    <div class="input-capsule">
        <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="handleFileSelect()">
        <div class="plus-btn" onclick="document.getElementById('file-input').click()" style="cursor: pointer;">+</div>
        <input type="text" id="user-input" placeholder="Ask LOYAL AI">
        <button class="send-btn" onclick="executeChatAction()">↑</button>
    </div>
    <div id="file-preview" style="color: #7d7d7d; font-size: 0.8rem; margin-top: 5px; padding-left: 40px; display: none;"></div>
</div>

<script>
    let selectedFileBase64 = null;
    let selectedFileMime = null;

    function handleFileSelect() {
        const fileInput = document.getElementById('file-input');
        const file = fileInput.files[0];
        const preview = document.getElementById('file-preview');
        
        if (file) {
            selectedFileMime = file.type;
            preview.innerText = `📁 Selected: ${file.name}`;
            preview.style.display = 'block';
            
            // Convert file to Base64 string to send easily via JSON
            const reader = new FileReader();
            reader.onload = function(e) {
                selectedFileBase64 = e.target.result.split(',')[1];
            };
            reader.readAsDataURL(file);
        }
    }

    async function executeChatAction() {
        const inputField = document.getElementById('user-input');
        const userText = inputField.value.trim();
        const streamBox = document.getElementById('chat-stream');
        
        if (!userText && !selectedFileBase64) return;
        
        // Render user message bubble
        const userBubble = document.createElement('div');
        userBubble.className = 'chat-bubble user';
        userBubble.innerText = userText ? userText : "Sent an image";
        streamBox.appendChild(userBubble);
        
        // Reset fields
        inputField.value = '';
        document.getElementById('file-preview').style.display = 'none';
        document.getElementById('file-input').value = '';
        streamBox.scrollTop = streamBox.scrollHeight;
        
        // Show thinking status
        const typingBubble = document.createElement('div');
        typingBubble.className = 'chat-bubble ai';
        typingBubble.style.color = '#7d7d7d';
        typingBubble.innerText = "LOYAL AI is analyzing...";
        streamBox.appendChild(typingBubble);
        streamBox.scrollTop = streamBox.scrollHeight;

        try {
            // Send text data and optional image data
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    message: userText || "Analyze this image", 
                    image_data: selectedFileBase64,
                    image_mime: selectedFileMime
                })
            });
            const data = await response.json();
            
            // Clear temporary image variables
            selectedFileBase64 = null;
            selectedFileMime = null;
            
            typingBubble.style.color = '#ececf1';
            typingBubble.innerText = data.reply;
        } catch (error) {
            typingBubble.innerText = "Error contacting LOYAL AI engine.";
        }
        streamBox.scrollTop = streamBox.scrollHeight;
    }

    document.getElementById('user-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') executeChatAction();
    });
</script>
