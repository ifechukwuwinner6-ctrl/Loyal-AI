<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile App Hub</title>
    <link rel="manifest" href="/manifest.json">
    <!-- Blue accent theme color for mobile browsers -->
    <meta name="theme-color" content="#1e40af">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            /* Premium deep black/dark-gray background */
            background-color: #0b0f19; 
            color: #f3f4f6;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        /* Electric Blue App Header */
        header {
            background-color: #1e40af;
            color: white;
            padding: 16px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 4px 12px rgba(30, 64, 175, 0.3);
        }
        /* Main Container */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        /* Sleek Dark Cards */
        .card {
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        h2 { 
            font-size: 1.1rem; 
            margin-bottom: 8px; 
            color: #3b82f6; /* Brilliant Blue Titles */
        }
        p { 
            font-size: 0.9rem; 
            color: #9ca3af; /* Soft gray for easy reading on dark backgrounds */
            line-height: 1.4; 
        }
        
        /* Vibrant Blue Action Button */
        .btn {
            display: block;
            width: 100%;
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 15px;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.4);
            transition: background 0.2s;
        }
        .btn:active { 
            background-color: #1d4ed8; 
        }

        /* Dark Bottom Navigation Bar */
        nav {
            background: #0f172a;
            border-top: 1px solid #1e293b;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
        }
        .nav-item {
            text-align: center;
            font-size: 0.75rem;
            color: #64748b;
            text-decoration: none;
        }
        .nav-item.active { 
            color: #3b82f6; 
            font-weight: bold; 
        }
    </style>
</head>
<body>

    <header>My Mobile AI App</header>

    <main>
        <div class="card">
            <h2>Welcome to your App Dashboard</h2>
            <p>Your new black and blue dark layout is ready. It's fully optimized for quick mobile navigation and reduces eye strain.</p>
        </div>

        <div class="card">
            <h2>AI Assistant Engine</h2>
            <p>Ready to process queries or display data pipeline feeds here.</p>
            <button class="btn" onclick="alert('Action triggered!')">Tap Action Button</button>
        </div>
    </main>

    <nav>
        <a href="#" class="nav-item active"><div>🏠</div>Home</a>
        <a href="#" class="nav-item"><div>📊</div>Data</a>
        <a href="#" class="nav-item"><div>⚙️</div>Settings</a>
    </nav>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript,console.log("Service Worker Registered");');
        }
    </script>
</body>
</html>
